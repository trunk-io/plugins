version: 0.1
tools:
  definitions:
    - name: biome
      # Available as a download, but release name doesn't configure well to our schema
      runtime: node
      package: "@biomejs/biome"
      shims: [biome]
      known_good_version: 2.3.4
lint:
  definitions:
    # Successor to the rome linter+formatter
    - name: biome
      files:
        - astro
        - css
        - graphql
        - javascript
        - json
        - typescript
      description: A static analyzer for web projects
      commands:
        - name: lint
          output: regex
          # Match both errors (×) and warnings (!). The marker line must be
          # the immediate next line (after a blank line) following the header,
          # so each diagnostic is parsed as a self-contained block — the prior
          # regex lazily matched across diagnostics and silently mis-attributed
          # path/line/col to a different finding's message. Info-level (i) is
          # intentionally excluded; biome surfaces those for hints, not gating.
          parse_regex:
            ' *(?P<path>[^\n]*?):(?P<line>\d+):(?P<col>\d+) (?P<code>[^ \n]+)[^\n]*\n[ \t]*\n[
            \t]+[×!] (?P<message>[^\n]+)'
          run: biome check ${target}
          success_codes: [0, 1]
          batch: true
          cache_results: true
          read_output_from: stderr
        - name: fmt
          output: rewrite
          run: biome check --fix "${target}"
          success_codes: [0, 1]
          batch: true
          cache_results: true
          formatter: true
          in_place: true
      tools: [biome]
      suggest_if: config_present
      direct_configs:
        - biome.json
        - biome.jsonc
        - rome.json # For backwards compatibility with rome
      affects_cache:
        - package.json
        - .editorconfig # Undocumented config file
      known_good_version: 2.3.4
      version_command:
        parse_regex: biome CLI version ${semver}
        run: biome --version
      symlinks:
        # biome's vcs.useIgnoreFile reads .gitignore from the sandbox root.
        # Without this, the per-target sandbox lacks .gitignore and biome
        # aborts with internalError/fs, silently dropping all findings.
        # See trunk-io/plugins#1113.
        - from: ${workspace}/.gitignore
          to: .gitignore
