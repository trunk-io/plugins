version: 0.1
# Binaries are hosted on the trunk.io CDN (small, clang-format-only tarballs).
# Available versions per platform:
#   14.0.1                            — linux-x86_64, macos-x86_64, macos-arm64
#                                       (no linux-aarch64 build was published)
#   16.0.3, 16.0.6                    — all four platforms
#   17.0.1, 17.0.6                    — all four platforms
#   18.1.8                            — all four platforms
#   20.1.0                            — all four platforms
# Any other version (e.g. 15.x, 19.x, 20.1.x>0, 21+) will 404.
downloads:
  - name: clang-format
    version: 20.1.0
    downloads:
      # macos arm64 was introduced after this version.
      - os: macos
        url: https://trunk.io/releases/clang-format-${version}-macos-x86_64.tar.gz
        version: <14.0.0
      - os:
          linux: linux
        cpu:
          arm_64: aarch64
          x86_64: x86_64
        url: https://trunk.io/releases/clang-format-${version}-${os}-${cpu}.tar.gz
      - os:
          macos: macos
        cpu:
          x86_64: x86_64
          arm_64: arm64
        url: https://trunk.io/releases/clang-format-${version}-${os}-${cpu}.tar.gz
      # TODO(chris): Windows download
tools:
  definitions:
    - name: clang-format
      download: clang-format
      shims: [clang-format]
      known_good_version: 14.0.1
      environment:
        - name: PATH
          list: ["${tool}/bin"]
lint:
  definitions:
    - name: clang-format
      supported_platforms: [linux, macos]
      description: Formatter for C/C++ and Protobuf
      files: [c/c++, cuda, proto]
      commands:
        - name: format
          output: rewrite
          run: clang-format -i ${target}
          success_codes: [0, 1]
          batch: true
          in_place: true
          cache_results: true
          formatter: true
      tools: [clang-format]
      suggest_if: config_present
      direct_configs: [.clang-format]
      known_good_version: 20.1.0
      version_command:
        parse_regex: ${semver}
        run: clang-format --version
