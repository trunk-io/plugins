name: Action Tests
description: Run tests against plugin actions

inputs:
  cli-version:
    description: Trunk cli version to run test against. Mutually exclusive with `cli-path`
    required: false
  cli-path:
    description: Trunk cli path to run test against. Overrides `cli-version` if set.
    required: false
  path:
    description: The cwd from which to run plugin commands
    required: false
    default: .
  append-args:
    description: Additional args to append to the test invocation
    required: false
    default: actions/ --
  trunk-prod-token:
    description: Test analytics prod api token (org token)
    required: false

runs:
  # TODO(Tyler): See if this can be converted to a js action
  using: composite
  steps:
    - name: Setup node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 22

    # The uv action tests' preCheck shells out to `uv lock` directly (not
    # through trunk), so we need uv available on PATH.
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        version: 0.7.8

    # The terraform-docs action's pre-commit hook shells out to
    # `terraform-docs`, so the binary needs to be on PATH inside the action
    # sandbox. There is no maintained setup-terraform-docs action, so install
    # the release tarball directly. Action Tests only run on ubuntu-latest.
    - name: Setup terraform-docs
      run: |
        version=0.16.0
        tmp=$(mktemp -d)
        curl -sSLo "$tmp/terraform-docs.tgz" \
          "https://github.com/terraform-docs/terraform-docs/releases/download/v${version}/terraform-docs-v${version}-linux-amd64.tar.gz"
        tar -xzf "$tmp/terraform-docs.tgz" -C "$tmp"
        sudo install -m 0755 "$tmp/terraform-docs" /usr/local/bin/terraform-docs
        terraform-docs --version
      shell: bash

    - name: Specify defaults
      run: |
        echo "CLI_PATH=${{ inputs.cli-path }}" >> "$GITHUB_ENV"

        case "$RUNNER_OS" in
          Windows)
            echo "PLATFORM_APPEND_ARGS=--maxWorkers=5" >> "$GITHUB_ENV"
            if [[ "${{ inputs.cli-path }}" == "" ]]; then
              echo "CLI_PATH=${{ github.workspace }}\trunk.ps1" >> "$GITHUB_ENV"
            fi
            ;;
        esac
      shell: bash

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: ${{ inputs.path }}

    - name: Run action tests
      run: npm test ${{ inputs.append-args }} ${{ env.PLATFORM_APPEND_ARGS }} --passWithNoTests --ci
      shell: bash
      working-directory: ${{ inputs.path }}
      continue-on-error: true
      env:
        JEST_SUITE_NAME: Action Tests
        PLUGINS_TEST_CLI_VERSION: ${{ inputs.cli-version }}
        PLUGINS_TEST_CLI_PATH: ${{ env.CLI_PATH }}

    - name: Upload prod results
      # TODO(Tyler): Add upload on Windows once the action supports it.
      if: "!cancelled() && runner.os != 'Windows' && inputs.trunk-prod-token != ''"
      uses: trunk-io/analytics-uploader@main
      with:
        junit-paths: junit.xml
        org-slug: trunk
        token: ${{ inputs.trunk-prod-token }}
        variant: ${{ runner.os }}
      env:
        TRUNK_PUBLIC_API_ADDRESS: https://api.trunk.io
