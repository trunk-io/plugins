name: Annotate fork-PRs with Trunk Check issues
on:
  workflow_run:
    workflows: [Pull Request]
    types: [completed]

permissions: read-all

jobs:
  trunk_check:
    name: Trunk Check Annotate
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trunk Check
        uses: trunk-io/trunk-action@04ba50e7658c81db7356da96657e6e77f220bfa3 # v1.3.1
        with:
          post-annotations: true
        # This job may fail when the PR was not run on a fork, and that's okay
        continue-on-error: true
